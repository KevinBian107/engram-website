<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">

  <!-- Rounded dark tile, matching favicon_tree aesthetic -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="#111111"/>

  <!-- ================= LEFT: handwritten scribble ================= -->
  <!-- A loose cursive stroke representing a handwritten note (ink trace / engram) -->
  <path d="M 18 40
           C 22 30, 32 30, 30 44
           C 28 58, 20 58, 22 70
           C 24 82, 34 80, 32 92"
        fill="none" stroke="#fff" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Faint ink tail, fading as it transitions to structure -->
  <path d="M 32 92 C 38 96, 44 92, 48 86"
        fill="none" stroke="#fff" stroke-width="1.6"
        stroke-linecap="round" opacity="0.55"/>

  <!-- ================= MIDDLE: transition ================= -->
  <!-- Three dashed guide-dots bridging scribble -> graph -->
  <circle cx="54" cy="64" r="1.2" fill="#fff" opacity="0.35"/>
  <circle cx="60" cy="64" r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="66" cy="64" r="1.2" fill="#fff" opacity="0.65"/>

  <!-- ================= RIGHT: structured knowledge graph ================= -->
  <!-- Edges first so nodes sit on top -->
  <line x1="86" y1="34" x2="108" y2="54" stroke="#fff" stroke-width="1.8"
        stroke-linecap="round" opacity="0.75"/>
  <line x1="86" y1="34" x2="82" y2="72" stroke="#fff" stroke-width="1.8"
        stroke-linecap="round" opacity="0.75"/>
  <line x1="108" y1="54" x2="100" y2="94" stroke="#fff" stroke-width="1.8"
        stroke-linecap="round" opacity="0.75"/>
  <line x1="82" y1="72" x2="100" y2="94" stroke="#fff" stroke-width="1.8"
        stroke-linecap="round" opacity="0.75"/>
  <line x1="82" y1="72" x2="108" y2="54" stroke="#fff" stroke-width="1.4"
        stroke-linecap="round" opacity="0.45"/>

  <!-- Nodes: filled dot with ring, echoing neural engram metaphor -->
  <circle cx="86"  cy="34" r="5.5" fill="#111111" stroke="#fff" stroke-width="2"/>
  <circle cx="86"  cy="34" r="2"   fill="#fff"/>

  <circle cx="108" cy="54" r="5.5" fill="#111111" stroke="#fff" stroke-width="2"/>
  <circle cx="108" cy="54" r="2"   fill="#fff"/>

  <circle cx="82"  cy="72" r="5.5" fill="#111111" stroke="#fff" stroke-width="2"/>
  <circle cx="82"  cy="72" r="2"   fill="#fff"/>

  <circle cx="100" cy="94" r="5.5" fill="#111111" stroke="#fff" stroke-width="2"/>
  <circle cx="100" cy="94" r="2"   fill="#fff"/>

  <!-- Subtle connector: scribble tail hinting at the first node -->
  <line x1="48" y1="86" x2="76" y2="72" stroke="#fff" stroke-width="1"
        stroke-dasharray="2,3" stroke-linecap="round" opacity="0.35"/>
</svg>
