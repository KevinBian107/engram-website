<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="560" fill="#ffffff"/>

  <!-- title -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2937">Engram — a hierarchy that is also a graph</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#6b7280">Notebook → Section → Note (solid), plus cross-links across notes added by the linking pass (dashed)</text>

  <!-- hierarchy edges (solid) -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <path d="M450,128 C 450,160 160,150 160,188"/>
    <path d="M450,128 L 450,188"/>
    <path d="M450,128 C 450,160 740,150 740,188"/>
    <!-- concept A -> notes -->
    <path d="M160,236 C 160,270 110,300 110,330"/>
    <path d="M160,236 C 160,270 212,300 212,330"/>
    <!-- concept B -> notes -->
    <path d="M450,236 C 450,270 398,300 398,330"/>
    <path d="M450,236 C 450,270 502,300 502,330"/>
    <!-- concept C -> notes -->
    <path d="M740,236 C 740,270 688,300 688,330"/>
    <path d="M740,236 C 740,270 792,300 792,330"/>
  </g>

  <!-- cross-links (dashed) -->
  <g stroke="#e07a3a" stroke-width="2.2" fill="none" stroke-dasharray="6 5" opacity="0.95">
    <path d="M212,372 C 280,440 330,440 398,372"/>
    <path d="M502,372 C 560,440 620,440 688,372"/>
    <path d="M110,376 C 320,500 560,500 792,376"/>
  </g>
  <text x="305" y="432" text-anchor="middle" font-size="11" fill="#c2632a">shared concept</text>
  <text x="595" y="432" text-anchor="middle" font-size="11" fill="#c2632a">prerequisite</text>
  <text x="451" y="496" text-anchor="middle" font-size="11" fill="#c2632a">related idea</text>

  <!-- domain / notebook -->
  <g>
    <rect x="360" y="80" width="180" height="48" rx="11" fill="#1f2937"/>
    <text x="450" y="104" text-anchor="middle" font-size="15" font-weight="600" fill="#ffffff">Domain</text>
    <text x="450" y="120" text-anchor="middle" font-size="10.5" fill="#9aa6b6">(notebook)</text>
  </g>

  <!-- concepts / sections -->
  <g font-size="14" font-weight="600" fill="#ffffff">
    <rect x="85"  y="188" width="150" height="48" rx="10" fill="#3b6ea5"/>
    <text x="160" y="212" text-anchor="middle">Concept A</text>
    <text x="160" y="228" text-anchor="middle" font-size="10" font-weight="400" fill="#d6e2ee">(section)</text>
    <rect x="375" y="188" width="150" height="48" rx="10" fill="#3b6ea5"/>
    <text x="450" y="212" text-anchor="middle">Concept B</text>
    <text x="450" y="228" text-anchor="middle" font-size="10" font-weight="400" fill="#d6e2ee">(section)</text>
    <rect x="665" y="188" width="150" height="48" rx="10" fill="#3b6ea5"/>
    <text x="740" y="212" text-anchor="middle">Concept C</text>
    <text x="740" y="228" text-anchor="middle" font-size="10" font-weight="400" fill="#d6e2ee">(section)</text>
  </g>

  <!-- notes / md files -->
  <g font-size="12" fill="#1f2937">
    <g>
      <rect x="58"  y="330" width="104" height="42" rx="9" fill="#eef2f7" stroke="#cbd5e1"/>
      <text x="110" y="356" text-anchor="middle">Note a₁</text>
      <rect x="160" y="330" width="104" height="42" rx="9" fill="#eef2f7" stroke="#cbd5e1"/>
      <text x="212" y="356" text-anchor="middle">Note a₂</text>
      <rect x="346" y="330" width="104" height="42" rx="9" fill="#eef2f7" stroke="#cbd5e1"/>
      <text x="398" y="356" text-anchor="middle">Note b₁</text>
      <rect x="450" y="330" width="104" height="42" rx="9" fill="#eef2f7" stroke="#cbd5e1"/>
      <text x="502" y="356" text-anchor="middle">Note b₂</text>
      <rect x="636" y="330" width="104" height="42" rx="9" fill="#eef2f7" stroke="#cbd5e1"/>
      <text x="688" y="356" text-anchor="middle">Note c₁</text>
      <rect x="740" y="330" width="104" height="42" rx="9" fill="#eef2f7" stroke="#cbd5e1"/>
      <text x="792" y="356" text-anchor="middle">Note c₂</text>
    </g>
  </g>
  <text x="451" y="318" text-anchor="middle" font-size="10.5" fill="#94a3b8">each note = one .md (summary) + its raw page .pdf</text>

  <!-- legend -->
  <g font-size="12" fill="#374151">
    <line x1="300" y1="532" x2="338" y2="532" stroke="#94a3b8" stroke-width="2"/>
    <text x="346" y="536">hierarchy</text>
    <line x1="452" y1="532" x2="490" y2="532" stroke="#e07a3a" stroke-width="2.2" stroke-dasharray="6 5"/>
    <text x="498" y="536">cross-link</text>
  </g>
</svg>
